<style>

.carousel {
  width: 100%;
  height: 300px;
  overflow: hidden;
  margin: auto;
  position: relative;
}

.slides {
  display: flex;
  animation: slide 12s infinite;
}

.slide {
  flex: 0 0 100%;
  position: relative;
}

.slide img {
  width: 100%;
  height: 300px;
  object-fit: cover;
}

.text {
  position: absolute;
  top: 20%;
  left: 20%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 2rem;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 5px;
}

@keyframes slide {
  0%, 30%   { transform: translateX(0); }
  33%, 63%  { transform: translateX(-100%); }
  66%, 96%  { transform: translateX(-200%); }
  100%      { transform: translateX(0); }
}
</style>
